<div class="game-setup min-h-screen relative">
  <div class="game-setup__scanline fixed inset-0 opacity-30 z-[100]"></div>

  <main class="game-setup__main relative py-10 px-hud-padding flex flex-col items-center justify-center min-h-screen">
    <div class="game-setup__orb game-setup__orb--cyan absolute top-1/4 left-10 w-64 h-64 rounded-full blur-[100px] -z-10"></div>
    <div class="game-setup__orb game-setup__orb--warm absolute bottom-1/4 right-10 w-96 h-96 rounded-full blur-[120px] -z-10"></div>
    <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <div class="game-setup__panel lg:col-span-12 p-hud-padding rounded-xl relative">
        <div class="game-setup__head flex flex-col items-center text-center mb-8 pb-6 border-b border-solid">
          <img
            src="assets/logo.png"
            class="game-setup__logo max-w-[min(100%,220px)] h-auto object-contain"
            width="220"
            height="80"
            alt="Scramblix"
          />
          <div class="flex items-center gap-3 justify-center mt-5">
            <span class="material-symbols-outlined game-setup__title-icon" style="font-variation-settings: 'FILL' 1">terminal</span>
            <h2 class="game-setup__title">MISSION CONFIG</h2>
          </div>
        </div>
        <div class="space-y-10">
          <section>
            <label class="game-setup__label font-label-sm text-label-sm uppercase tracking-widest mb-4 block">Choose Grid Size</label>
            <div class="flex gap-4">
              <div class="game-setup__field flex-1 border border-solid p-4 rounded-lg flex items-center justify-between">
                <span class="game-setup__field-caption font-label-sm">ROWS</span>
                <div class="flex items-center gap-4">
                  <button
                    type="button"
                    class="game-setup__step-btn w-8 h-8 flex items-center justify-center border border-solid rounded transition-colors"
                    [disabled]="!canDecRows()"
                    (click)="decRows()"
                    aria-label="Decrease rows"
                  >
                    <span class="material-symbols-outlined text-sm">remove</span>
                  </button>
                  <span class="game-setup__value font-data-lg text-data-lg">{{ pad2(rows) }}</span>
                  <button
                    type="button"
                    class="game-setup__step-btn w-8 h-8 flex items-center justify-center border border-solid rounded transition-colors"
                    [disabled]="!canIncRows()"
                    (click)="incRows()"
                    aria-label="Increase rows"
                  >
                    <span class="material-symbols-outlined text-sm">add</span>
                  </button>
                </div>
              </div>
              <div class="game-setup__field flex-1 border border-solid p-4 rounded-lg flex items-center justify-between">
                <span class="game-setup__field-caption font-label-sm">COLS</span>
                <div class="flex items-center gap-4">
                  <button
                    type="button"
                    class="game-setup__step-btn w-8 h-8 flex items-center justify-center border border-solid rounded transition-colors"
                    [disabled]="!canDecCols()"
                    (click)="decCols()"
                    aria-label="Decrease columns"
                  >
                    <span class="material-symbols-outlined text-sm">remove</span>
                  </button>
                  <span class="game-setup__value font-data-lg text-data-lg">{{ pad2(cols) }}</span>
                  <button
                    type="button"
                    class="game-setup__step-btn w-8 h-8 flex items-center justify-center border border-solid rounded transition-colors"
                    [disabled]="!canIncCols()"
                    (click)="incCols()"
                    aria-label="Increase columns"
                  >
                    <span class="material-symbols-outlined text-sm">add</span>
                  </button>
                </div>
              </div>
            </div>
          </section>
          <section>
            <label class="game-setup__label font-label-sm text-label-sm uppercase tracking-widest mb-4 block">Choose Time Limit</label>
            <div class="grid grid-cols-4 gap-3" role="group" aria-label="Time limit">
              <button
                *ngFor="let sec of timeLimitChoices"
                type="button"
                class="game-setup__chip py-3 px-2 border border-solid rounded font-data-lg text-label-sm transition-all"
                [class.game-setup__chip--active]="timeLimitSeconds === sec"
                [attr.aria-pressed]="timeLimitSeconds === sec"
                (click)="selectTimeLimit(sec)"
              >
                {{ sec }}S
              </button>
            </div>
          </section>
          <button
            type="button"
            class="game-setup__cta w-full font-display-xl py-6 rounded-xl flex items-center justify-center gap-4 border-2 border-solid active:scale-95 transition-all group overflow-hidden relative"
            [disabled]="!canStartMission()"
            (click)="startMission()"
          >
            <div class="game-setup__cta-shine absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <span class="game-setup__cta-label">Start Mission</span>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
